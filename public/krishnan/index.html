<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Krishnan — Growth Journey | Innovfix</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #122a4f;
    --blue: #2563eb;
    --blue-soft: #e8f0ff;
    --green: #16a34a;
    --green-soft: #e6f6ec;
    --ink: #1f2937;
    --muted: #8a93a3;
    --line: #d7deea;
    --card-border: #e9edf4;
    --amber: #d97706;
    --amber-soft: #fdeccd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-text-size-adjust: 100%; height: 100%; }

  body {
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #f4f6fb;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    height: 100dvh;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  body::-webkit-scrollbar { width: 0; height: 0; }

  /* Each card occupies one screen and snaps into view */
  .slide {
    --frame-y: clamp(28px, 5vh, 52px);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: center;
    scroll-snap-stop: always;
    padding:
      calc(var(--frame-y) + env(safe-area-inset-top, 0px))
      max(14px, env(safe-area-inset-right, 0px))
      calc(var(--frame-y) + env(safe-area-inset-bottom, 0px))
      max(14px, env(safe-area-inset-left, 0px));
  }

  .card-sheet {
    width: min(100%, 440px);
    max-width: calc(100vw - 28px);
    max-height: calc(100dvh - (var(--frame-y) * 2) - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
    background: #ffffff;
    border-radius: 24px;
    padding: 18px 20px 16px;
    box-shadow: 0 24px 56px -20px rgba(18, 42, 79, 0.26);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    overflow: visible;
  }

  /* ---------- Header ---------- */
  .avatar-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .avatar {
    width: clamp(108px, 30vmin, 150px);
    height: clamp(108px, 30vmin, 150px);
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 5px solid #fff;
    box-shadow: 0 0 0 2px #eef1f7, 0 14px 28px -14px rgba(18, 42, 79, 0.4);
  }

  .name {
    text-align: center;
    font-size: clamp(30px, 9vw, 46px);
    font-weight: 800;
    letter-spacing: 0.05em;
    color: var(--navy);
    margin-bottom: 14px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* ---------- Timeline ---------- */
  .timeline {
    --date-col: 88px;
    --col-gap: 8px;
    position: relative;
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(8px, 2vh, 16px);
    width: 100%;
    min-height: 0;
    overflow: visible;
  }

  .timeline::before {
    display: block;
    content: "";
    position: absolute;
    top: 28px;
    bottom: 28px;
    left: calc(var(--date-col) + var(--col-gap) + 26px);
    width: 2px;
    background: var(--line);
    z-index: 0;
  }

  .stop {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: var(--date-col) 52px minmax(0, 1fr);
    column-gap: var(--col-gap);
    align-items: center;
    width: 100%;
    flex-shrink: 0;
    overflow: visible;
  }

  .when {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 5px;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.15px;
    white-space: nowrap;
    min-width: 0;
    padding-right: 2px;
  }
  .when .yr { color: var(--navy); }
  .when .lead { display: flex; align-items: center; gap: 4px; }
  .when .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .when .dash { width: 10px; height: 2px; border-radius: 2px; flex-shrink: 0; }
  .stop--blue  .when .dot, .stop--blue  .when .dash { background: var(--blue); }
  .stop--green .when .dot, .stop--green .when .dash { background: var(--green); }

  .node {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
  }
  .stop--blue  .node { border: 3px solid var(--blue);  box-shadow: 0 0 0 6px var(--blue-soft); }
  .stop--green .node { border: 3px solid var(--green); box-shadow: 0 0 0 6px var(--green-soft); }
  .node svg { width: 24px; height: 24px; }
  .stop--blue  .node svg { stroke: var(--blue); }
  .stop--green .node svg { stroke: var(--green); }

  .info {
    background: #fff;
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 12px 14px;
    box-shadow: 0 10px 22px -16px rgba(18, 42, 79, 0.28);
    width: 100%;
    max-width: none;
    text-align: left;
  }
  .info .eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    position: relative;
    padding-bottom: 6px;
  }
  .info .eyebrow::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 32px;
    height: 2px;
    border-radius: 2px;
    background: var(--line);
  }
  .info .role {
    font-size: clamp(16px, 4.2vw, 20px);
    font-weight: 700;
    letter-spacing: 0.1px;
    line-height: 1.2;
  }
  .stop--blue  .info .role { color: var(--blue); }
  .stop--green .info .role { color: var(--green); }

  .stop--amber .when .dot, .stop--amber .when .dash { background: var(--amber); }
  .stop--amber .node { border: 3px solid var(--amber); box-shadow: 0 0 0 6px var(--amber-soft); }
  .stop--amber .node svg { stroke: var(--amber); }
  .stop--amber .info .role { color: var(--amber); }

  .midband {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  .midband span {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.3px;
    color: var(--navy);
    text-transform: uppercase;
    background: #fff;
    padding: 0 4px;
    white-space: nowrap;
  }
  .midband .rule { flex: 1; height: 1px; background: var(--line); max-width: 80px; }

  .footer {
    margin-top: 10px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.3px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .footer b { color: var(--navy); font-weight: 700; }

  /* subtle scroll hint on first card only */
  .scroll-hint {
    position: absolute;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.85;
    animation: bob 1.6s ease-in-out infinite;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  body.scrolled .scroll-hint { opacity: 0; }
  .scroll-hint svg { width: 18px; height: 18px; stroke: var(--muted); }
  @keyframes bob { 0%,100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, 5px); } }

  /* ---------- Desktop ---------- */
  @media (min-width: 641px) {
    .card-sheet {
      width: min(100%, 560px);
      max-width: 560px;
      border-radius: 28px;
      padding: 44px 40px 40px;
    }
    .avatar { width: 168px; height: 168px; }
    .name { font-size: 44px; letter-spacing: 4px; margin-bottom: 36px; }
    .timeline { --date-col: 96px; --col-gap: 18px; }
    .timeline::before { left: calc(96px + 18px + 28px); top: 26px; bottom: 26px; }
    .stop { grid-template-columns: 96px 56px minmax(0, 1fr); }
    .when { justify-content: flex-end; font-size: 15px; }
    .node { width: 56px; height: 56px; }
    .node svg { width: 26px; height: 26px; }
    .info { padding: 16px 20px; }
    .info .role { font-size: 21px; }
    .midband { margin: 8px 0; }
    .midband .rule { max-width: 150px; }
    .footer { margin-top: 28px; font-size: 12.5px; }
  }

  /* ---------- Short screens ---------- */
  @media (max-height: 700px) {
    .slide { --frame-y: clamp(18px, 3vh, 30px); }
    .card-sheet { padding: 14px 18px 12px; border-radius: 20px; }
    .avatar { width: 96px; height: 96px; }
    .name { font-size: 26px; margin-bottom: 8px; }
    .timeline { gap: 6px; --date-col: 82px; }
    .stop { grid-template-columns: var(--date-col) 46px minmax(0, 1fr); }
    .when { font-size: 11px; }
    .node { width: 46px; height: 46px; }
    .node svg { width: 20px; height: 20px; }
    .info { padding: 10px 12px; }
    .info .role { font-size: 15px; }
    .timeline::before { top: 22px; bottom: 22px; }
  }
</style>
</head>
