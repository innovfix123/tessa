; Per-app PHP-FPM overrides for Tessa.
; Sized to match nginx client_max_body_size (1024M) and PHP-FPM php.ini
; (upload_max_filesize 1024M / post_max_size 1100M). Daily-report video
; uploads need the full 1 GB ceiling — keeping this low silently 413s
; legitimate uploads with the misleading "limit of 57M bytes" FPM error.
upload_max_filesize = 1024M
post_max_size = 1100M
; NB: max_file_uploads (PHP default 20) is PHP_INI_SYSTEM and CANNOT be raised
; here — .user.ini only honours PERDIR/USER directives. Travel trips cap at 20
; screenshots, which fits PHP's 20. To allow more, set it in the PHP-FPM pool
; (php_admin_value[max_file_uploads]) and bump the cap in TravelExpenseController
; + bills.js together.
