<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Fida — Growth Journey | Innovfix</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #122a4f;
    --blue: #2563eb;
    --blue-soft: #e8f0ff;
    --green: #16a34a;
    --green-soft: #e6f6ec;
    --ink: #1f2937;
    --muted: #8a93a3;
    --line: #d7deea;
    --card-border: #e9edf4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    -webkit-text-size-adjust: 100%;
    height: 100%;
    overflow: hidden;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    --frame-y: clamp(36px, 6vh, 56px);
    --frame-x: 14px;
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #f4f6fb;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    height: 100dvh;
    padding:
      calc(var(--frame-y) + env(safe-area-inset-top, 0px))
      max(var(--frame-x), env(safe-area-inset-right, 0px))
      calc(var(--frame-y) + env(safe-area-inset-bottom, 0px))
      max(var(--frame-x), env(safe-area-inset-left, 0px));
    overflow: hidden;
  }

  /* Mobile: rounded card, fits one screen — no scroll */
  .card-sheet {
    width: min(100%, 440px);
    max-width: calc(100vw - (var(--frame-x) * 2) - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px));
    max-height: calc(
      100dvh
      - (var(--frame-y) * 2)
      - env(safe-area-inset-top, 0px)
      - env(safe-area-inset-bottom, 0px)
    );
    background: #ffffff;
    border-radius: 24px;
    padding: 18px 20px 16px;
    box-shadow: 0 24px 56px -20px rgba(18, 42, 79, 0.26);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    overflow: visible;
    flex: 0 1 auto;
    margin-block: auto;
    min-height: 0;
  }

  /* ---------- Header ---------- */
  .avatar-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .avatar {
    width: clamp(108px, 30vmin, 150px);
    height: clamp(108px, 30vmin, 150px);
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 5px solid #fff;
    box-shadow: 0 0 0 2px #eef1f7, 0 14px 28px -14px rgba(18, 42, 79, 0.4);
  }

  .name {
    text-align: center;
    font-size: clamp(34px, 10vmin, 48px);
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--navy);
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  /* ---------- Timeline ---------- */
  .timeline {
    --date-col: 88px;
    --col-gap: 8px;
    position: relative;
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(8px, 2vh, 16px);
    width: 100%;
    min-height: 0;
    overflow: visible;
  }

  .timeline::before {
    display: block;
    content: "";
    position: absolute;
    top: 28px;
    bottom: 28px;
    left: calc(var(--date-col) + var(--col-gap) + 26px);
    width: 2px;
    background: var(--line);
    z-index: 0;
  }

  .stop {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: var(--date-col) 52px minmax(0, 1fr);
    column-gap: var(--col-gap);
    align-items: center;
    width: 100%;
    flex-shrink: 0;
    overflow: visible;
  }

  .when {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 5px;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.15px;
    white-space: nowrap;
    min-width: 0;
    padding-right: 2px;
  }
  .when .yr { color: var(--navy); }
  .when .lead { display: flex; align-items: center; gap: 4px; }
  .when .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .when .dash { width: 10px; height: 2px; border-radius: 2px; flex-shrink: 0; }
  .stop--blue  .when .dot, .stop--blue  .when .dash { background: var(--blue); }
  .stop--green .when .dot, .stop--green .when .dash { background: var(--green); }

  /* node */
  .node {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
  }
  .stop--blue  .node { border: 3px solid var(--blue);  box-shadow: 0 0 0 6px var(--blue-soft); }
  .stop--green .node { border: 3px solid var(--green); box-shadow: 0 0 0 6px var(--green-soft); }
  .node svg { width: 24px; height: 24px; }
  .stop--blue  .node svg { stroke: var(--blue); }
  .stop--green .node svg { stroke: var(--green); }

  /* info card */
  .info {
    background: #fff;
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 12px 14px;
    box-shadow: 0 10px 22px -16px rgba(18, 42, 79, 0.28);
    width: 100%;
    max-width: none;
    text-align: left;
  }
  .info .eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    position: relative;
    padding-bottom: 6px;
  }
  .info .eyebrow::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 32px;
    height: 2px;
    border-radius: 2px;
    background: var(--line);
  }
  .info .role {
    font-size: clamp(16px, 4.2vw, 20px);
    font-weight: 700;
    letter-spacing: 0.1px;
    line-height: 1.2;
  }
  .stop--blue  .info .role { color: var(--blue); }
  .stop--green .info .role { color: var(--green); }

  /* mid band */
  .midband {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  .midband span {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.3px;
    color: var(--navy);
    text-transform: uppercase;
    background: #fff;
    padding: 0 4px;
    white-space: nowrap;
  }
  .midband .rule { flex: 1; height: 1px; background: var(--line); max-width: 80px; }

  .footer {
    margin-top: 10px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.3px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .footer b { color: var(--navy); font-weight: 700; }

  /* ---------- Desktop: card + horizontal timeline ---------- */
  @media (min-width: 641px) {
    html, body { height: auto; min-height: 100%; overflow: auto; }

    body {
      background: #f4f6fb;
      align-items: center;
      padding: 32px 16px;
      min-height: 100vh;
      min-height: 100dvh;
      height: auto;
      overflow: auto;
    }

    .card-sheet {
      max-width: 560px;
      max-height: none;
      min-height: auto;
      border-radius: 28px;
      padding: 52px 40px 56px;
      box-shadow: 0 30px 70px -28px rgba(18, 42, 79, 0.28);
      justify-content: center;
      flex-shrink: 0;
    }

    .timeline {
      flex: none;
      display: block;
      min-height: auto;
    }

    .avatar {
      width: 168px;
      height: 168px;
    }

    .name {
      font-size: 54px;
      letter-spacing: 6px;
      margin-bottom: 46px;
    }

    .timeline::before {
      display: block;
      content: "";
      position: absolute;
      top: 26px;
      bottom: 26px;
      left: calc(96px + 18px + 28px);
      width: 2px;
      background: var(--line);
      z-index: 0;
    }

    .stop {
      display: grid;
      grid-template-columns: 96px 56px minmax(0, 1fr);
      column-gap: 18px;
      align-items: center;
      text-align: left;
    }

    .when {
      justify-content: flex-end;
      font-size: 15px;
    }

    .when .lead { display: flex; }

    .node { width: 56px; height: 56px; }

    .info {
      max-width: none;
      padding: 16px 20px;
      text-align: left;
    }

    .info .eyebrow::after {
      left: 0;
      transform: none;
    }

    .info .role { font-size: 21px; }

    .midband { margin: 26px 0; }
    .midband .rule { max-width: 150px; }

    .footer {
      margin-top: 40px;
      font-size: 12.5px;
    }
  }

  /* Very short screens (e.g. iPhone SE) */
  @media (max-height: 700px) {
    body { --frame-y: clamp(24px, 4vh, 36px); }
    .card-sheet { padding: 14px 18px 12px; border-radius: 20px; }
    .avatar { width: 96px; height: 96px; }
    .name { font-size: 32px; margin-bottom: 10px; }
    .timeline { gap: 6px; }
    .timeline { --date-col: 82px; }
    .stop { grid-template-columns: var(--date-col) 46px minmax(0, 1fr); }
    .when { font-size: 11px; }
    .node { width: 46px; height: 46px; }
    .node svg { width: 20px; height: 20px; }
    .info { padding: 10px 12px; }
    .info .role { font-size: 15px; }
    .timeline::before { top: 22px; bottom: 22px; }
  }
</style>
</head>
